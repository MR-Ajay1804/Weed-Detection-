<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Weed vs Crop Detection</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      --primary: #16a34a;
      --primary-strong: #15803d;
      --accent: #0f766e;
      --bg: #f7faf7;
      --panel: #ffffff;
      --text: #102016;
      --muted: #647067;
      --border: #dbe7dd;
      --danger: #b42318;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(22, 163, 74, 0.08), rgba(15, 118, 110, 0.04)),
        var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 48px 20px;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      max-width: 560px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 36px 30px;
      text-align: center;
      box-shadow: 0 20px 45px rgba(16, 32, 22, 0.12);
    }

    h1 {
      font-weight: 800;
      font-size: clamp(1.8rem, 4vw, 2.3rem);
      letter-spacing: 0;
      margin-bottom: 8px;
      color: var(--text);
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 30px;
    }

    .upload-zone {
      display: block;
      position: relative;
      padding: 44px 20px;
      border: 1px dashed #9dc7a8;
      border-radius: 8px;
      background: #f3faf4;
      cursor: pointer;
      transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
      overflow: hidden;
    }

    .upload-zone:hover {
      border-color: var(--primary);
      background: #edf8ef;
      transform: translateY(-1px);
    }

    .upload-zone input { display: none; }

    #file-text {
      font-weight: 700;
      color: var(--muted);
      font-size: 0.95rem;
      overflow-wrap: anywhere;
    }

    .scanner {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      animation: scan 2s linear infinite;
    }

    @keyframes scan {
      0% { top: 0%; }
      100% { top: 100%; }
    }

    .btn-main {
      margin-top: 20px;
      width: 100%;
      padding: 18px;
      border-radius: 8px;
      background: var(--primary);
      color: #ffffff;
      border: none;
      font-weight: 800;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .btn-main:hover {
      background: var(--primary-strong);
      transform: translateY(-1px);
    }

    .results-grid {
      margin-top: 30px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      animation: fadeInUp 0.8s ease;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .bento-item {
      background: #f8fbf8;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      text-align: left;
    }

    .bento-large {
      grid-column: span 2;
      padding: 10px;
    }

    .label-small {
      font-size: 10px;
      text-transform: uppercase;
      color: var(--muted);
      letter-spacing: 0;
      display: block;
      margin-bottom: 5px;
    }

    .data-val {
      font-family: "Cascadia Mono", "SFMono-Regular", Consolas, monospace;
      font-weight: 700;
      font-size: 1.3rem;
      color: var(--accent);
    }

    .result-img {
      width: 100%;
      border-radius: 8px;
      border: 1px solid var(--border);
      display: block;
    }

    .new-btn {
      margin-top: 15px;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      text-transform: none;
    }

    .new-btn:hover {
      color: var(--text);
      background: #edf8ef;
    }

    .error {
      color: var(--danger);
      font-size: 13px;
      margin-bottom: 20px;
      background: #fff4f2;
      padding: 10px;
      border: 1px solid #ffd8d3;
      border-radius: 8px;
    }

    @media (max-width: 520px) {
      body {
        padding: 24px 12px;
      }

      .card {
        padding: 28px 18px;
      }

      .results-grid {
        grid-template-columns: 1fr;
      }

      .bento-large {
        grid-column: span 1;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <h1>Weed vs Crop Detection</h1>
      <p class="subtitle">Upload a plant image to classify it as weed or crop.</p>

      {% if error %}
        <div class="error" role="alert">{{ error }}</div>
      {% endif %}

      <form method="post" enctype="multipart/form-data" onsubmit="startLoading()">
        <label class="upload-zone">
          <div class="scanner" id="scan-bar"></div>
          <input type="file" name="file" accept=".png,.jpg,.jpeg,image/png,image/jpeg" required onchange="showFileName(this)">
          <div id="file-text">Drop image or click to choose</div>
        </label>

        <button type="submit" class="btn-main" id="submit-btn">Analyze Image</button>
      </form>

      {% if result %}
        <div class="results-grid" id="results">
          <div class="bento-item">
            <span class="label-small">Identity</span>
            <span class="data-val">{{ result }}</span>
          </div>

          <div class="bento-item">
            <span class="label-small">Confidence</span>
            <span class="data-val">
              {% set top_p = probs.values()|max if probs else 0 %}
              {{ (top_p * 100)|round(1) }}%
            </span>
          </div>

          <div class="bento-item bento-large">
            <img class="result-img" src="{{ url_for('static', filename=image_file) }}" alt="Uploaded plant sample">
          </div>

          <button class="btn-main new-btn" onclick="resetPage()">Analyze Another Image</button>
        </div>
      {% endif %}
    </div>
  </div>

  <script>
    function showFileName(input) {
      const name = input.files[0]?.name || "Drop image or click to choose";
      document.getElementById("file-text").innerText = name;
      document.getElementById("file-text").style.color = "#0f766e";
    }

    function startLoading() {
      document.getElementById("scan-bar").style.display = "block";
      document.getElementById("submit-btn").innerText = "Analyzing...";
      document.getElementById("submit-btn").style.opacity = "0.7";
    }

    function resetPage() {
      window.location.href = "/";
    }

    window.onload = function() {
      if (document.getElementById("results")) {
        document.getElementById("results").scrollIntoView({ behavior: "smooth" });
      }
    };
  </script>
</body>
</html>
